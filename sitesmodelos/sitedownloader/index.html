<style>
  /* ============================================================
     DESIGN TOKENS — Aetheris/Asimov void+mint palette
     ============================================================ */
  :root {
    --void: #030303;
    --panel: #080808;
    --panel-2: #0d0d0d;
    --mint: #00ffa3;
    --mint-soft: rgba(0, 255, 163, 0.12);
    --mint-dark: #00b372;
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.15);
    --sub: #888888;
    --white: #ffffff;
    --error: #ff5577;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--void);
    color: #e0e0e0;
    height: 100%;
  }

  body {
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    background-color: var(--void);
    background-image:
      linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),

    min-height: 100vh;

  ::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--mint); }

  /* ============================================================

  }
  .bg-vignette {
    position: fixed; inset: 0;

  }

  /* ============================================================

     ============================================================ */
  .hud-overlay {

  .hud-tl { top: 18px; left: 18px; border-top: 1px solid var(--white); border-left: 1px solid var(--white); }

  .hud-bl { bottom: 18px; left: 18px; border-bottom: 1px solid var(--white); border-left: 1px solid var(--white); }
  .hud-br { bottom: 18px; right: 18px; border-bottom: 1px solid var(--white); border-right: 1px solid var(--white); }
  .hud-status {

  /* Grab button */
  .grab-btn {
    position: relative;
    width: 100%;

  .grab-btn:hover:not(:disabled)::before { left: 100%; }

  .spinner {

<script>
  /* ============================================================
     PARTICLE BACKGROUND (canvas, mint-tinted) — fullscreen
     ============================================================ */
  (function particles() {
    const canvas = document.getElementById('particles');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let w, h, dots, raf;
    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    function resize() {
      w = canvas.width = window.innerWidth * DPR;
      h = canvas.height = window.innerHeight * DPR;
      canvas.style.width = '100%';
      canvas.style.height = '100%';
      seed();
    }
    function seed() {
      const N = Math.floor((window.innerWidth * window.innerHeight) / 16000);
      dots = Array.from({ length: N }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.25 * DPR,
        vy: (Math.random() - 0.5) * 0.25 * DPR,
        r: (Math.random() * 1.4 + 0.4) * DPR,
        a: Math.random() * 0.5 + 0.2
      }));
    }
    function draw() {
      ctx.clearRect(0, 0, w, h);
      for (const d of dots) {
        d.x += d.vx; d.y += d.vy;
        if (d.x < 0 || d.x > w) d.vx *= -1;
        if (d.y < 0 || d.y > h) d.vy *= -1;
        ctx.beginPath();
        ctx.fillStyle = `rgba(0, 255, 163, ${d.a})`;
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fill();
      }
      const MAX = 130 * DPR;
      for (let i = 0; i < dots.length; i++) {
        for (let j = i + 1; j < dots.length; j++) {
          const dx = dots[i].x - dots[j].x;
          const dy = dots[i].y - dots[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < MAX) {
            const op = (1 - dist / MAX) * 0.18;
            ctx.beginPath();
            ctx.strokeStyle = `rgba(0, 255, 163, ${op})`;
            ctx.lineWidth = 0.5 * DPR;
            ctx.moveTo(dots[i].x, dots[i].y);
            ctx.lineTo(dots[j].x, dots[j].y);
            ctx.stroke();
          }
        }
      }
      raf = requestAnimationFrame(draw);
    }
    let resizeT;
    window.addEventListener('resize', () => {
      clearTimeout(resizeT);
      resizeT = setTimeout(resize, 120);
    });
    resize();
    draw();
  })();

  /* ============================================================
     REAL CAPTURE — POST /start-download → SSE /stream/<sid> → /download-file/<sid>
     ============================================================ */
  let es = null;
  let cursorEl = null;

  function startGrab() {
    const input = document.getElementById('url');
    let url = input.value.trim();
    if (!url) {
      flashError(input);
      return;
    }
    if (!/^https?:\/\//i.test(url)) {
      url = 'https://' + url;
      input.value = url;
    }

    setLoading(true);
    setHeadStatus('capturando');
    closeSuccess();
    clearLogs();
    openLogs();
    addCursor();

    fetch('/start-download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          removeCursor();
          addLog('Erro: ' + data.error, 'err');
          setHeadStatus('falhou');
          setLoading(false);
          return;
        }
        listenSSE(data.session_id);
      })
      .catch(err => {
        removeCursor();
        addLog('Erro de rede: ' + err.message, 'err');
        setHeadStatus('falhou');
        setLoading(false);
      });
  }

  function listenSSE(sid) {
    es = new EventSource('/stream/' + sid);

    es.onmessage = e => addLog(e.data);

    es.addEventListener('done', e => {
      es.close();
      es = null;
      removeCursor();
      if (e.data === 'complete') {
        setHeadStatus('concluído');
        triggerDownload(sid);
        showSuccess(sid);
      } else {
        setHeadStatus('falhou');
      }
      setTimeout(() => setLoading(false), 400);
    });

    es.onerror = () => {
      if (es) { es.close(); es = null; }
      removeCursor();
      setHeadStatus('desconectado');
      setLoading(false);
    };
  }

  function triggerDownload(sid) {
    const href = '/download-file/' + sid;
    const a = document.createElement('a');
    a.href = href;
    a.click();
    document.getElementById('dl-link').href = href;
  }

  /* ============================================================
     UI helpers
     ============================================================ */
  function setLoading(on) {
    const btn = document.getElementById('grab');
    const lbl = document.getElementById('btn-label');
    const arr = document.getElementById('btn-arrow');
    const inp = document.getElementById('url');
    btn.disabled = on;
    inp.disabled = on;
    if (on) {
      btn.classList.add('loading');
      lbl.textContent = 'Capturando';
      arr.style.display = 'none';
    } else {
      btn.classList.remove('loading');
      lbl.textContent = 'Baixar Site';
      arr.style.display = '';
    }
  }

  function setHeadStatus(text) {
    const el = document.getElementById('head-status');
    if (el) el.textContent = text;
  }

  function flashError(input) {
    input.focus();
    const wrap = input.closest('.input-wrap');
    wrap.style.borderColor = '#ff5577';
    wrap.style.boxShadow = '0 0 0 1px #ff5577, 0 0 18px rgba(255,85,119,0.18)';
    setTimeout(() => {
      wrap.style.borderColor = '';
      wrap.style.boxShadow = '';
    }, 1400);
  }

  function openLogs() {
    document.getElementById('log-shell').classList.add('open');
  }

  function clearLogs() {
    document.getElementById('logs').innerHTML = '';
  }

  /* Detect line type from leading emoji / keywords. */
  function classifyLine(text) {
    const t = text.trim();
    if (/^(❌|⛔|🚫|✗)/.test(t) || /^erro/i.test(t) || /falhou/i.test(t)) return 'err';
    if (/^(⚠️|⚠)/.test(t) || /aviso/i.test(t)) return 'warn';
    if (/^(✅|✔|✓|🎉|🟢)/.test(t) || /pronto/i.test(t) || /conclu(í|i)d/i.test(t)) return 'ok';
    return '';
  }

  function addLog(text, forcedClass) {
    const box = document.getElementById('logs');
    const ts = nowTS();
    const cls = forcedClass || classifyLine(text);
    const el = document.createElement('div');
    el.className = 'log-line ' + cls;
    el.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="ic">${cls === 'err' ? '✗' : cls === 'warn' ? '!' : cls === 'ok' ? '✓' : '›'}</span>
      <span class="msg"></span>
    `;
    el.querySelector('.msg').textContent = text;
    if (cursorEl && cursorEl.parentNode === box) {
      box.insertBefore(el, cursorEl);
    } else {
      box.appendChild(el);
    }
    box.scrollTop = box.scrollHeight;
  }

  function addCursor() {
    const box = document.getElementById('logs');
    cursorEl = document.createElement('div');
    cursorEl.className = 'cursor-line';
    cursorEl.innerHTML = `
      <span class="ts">${nowTS()}</span>
      <span class="ic">›</span>
      <span class="blink"></span>
    `;
    box.appendChild(cursorEl);
  }

  function removeCursor() {
    if (cursorEl && cursorEl.parentNode) {
      cursorEl.parentNode.removeChild(cursorEl);
      cursorEl = null;
    }
  }

  function nowTS() {
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function showSuccess(sid) {
    document.getElementById('ok').classList.add('open');
  }

  function closeSuccess() {
    document.getElementById('ok').classList.remove('open');
  }

  /* enter key triggers grab */
  document.getElementById('url').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('grab').disabled) {
      e.preventDefault();
      startGrab();
    }
  });
</script>
